    /* ── Left Sidebar ── */
    .sidebar {
      width: 72px;
      background: var(--sidebar-bg);
      border-right: 1px solid var(--sidebar-border);
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 16px 0;
      justify-content: space-between;
      flex-shrink: 0;
      z-index: 10;
      transition: background 0.25s ease, border-color 0.25s ease;
    }
    .nav-top, .nav-bottom {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 20px;
    }
    .nav-item {
      display: flex;
      flex-direction: column;
      align-items: center;
      color: var(--text-muted);
      cursor: pointer;
      font-size: 11px;
      gap: 4px;
      text-decoration: none;
      transition: color 0.15s ease;
    }
    .nav-item:hover { color: var(--text); }
    .nav-icon {
      font-size: 20px;
      display: flex;
      justify-content: center;
      align-items: center;
      width: 32px;
      height: 32px;
      border-radius: 8px;
      transition: background 0.15s ease;
    }
    .nav-item.active .nav-icon {
      background-color: var(--nav-active-bg);

            <div class="tool-icon" style="color:#6366f1;">🖼️</div>
            <div class="tool-name">AI 影像</div>
          </div>
          <div class="tool-item">
            <div class="tool-icon" style="color:#f59e0b;">▶️</div>
            <div class="tool-name">AI 影片</div>
          </div>
        </div>
      </div>

      <div class="tool-category" style="border:none;">
        <div class="category-title">工具</div>
        <div class="tools-list">
          <div class="tool-item">
            <div class="tool-icon" style="color:#10b981;">📓</div>
            <div class="tool-name">AI 會議筆記</div>
          </div>
          <div class="tool-item">
            <div class="tool-icon" style="color:#a8a29e;">✨</div>
            <div class="tool-name">所有智能體</div>
          </div>
        </div>
      </div>

    </div>
  </main>

  <!-- Settings Modal -->
  <div class="settings-overlay" id="settings-overlay">
    <div class="settings-panel">
      <div class="settings-sidebar">
        <div class="settings-sidebar-header">
          <h2>⚙️ 設置</h2>
          <button class="settings-sidebar-close" id="settings-close">✕</button>
        </div>
        <div class="settings-nav" id="settings-nav"></div>
      </div>
      <div class="settings-content" id="settings-content"></div>
    </div>
  </div>

  <!-- Floating assistant icon -->
  <div class="assistant-float" id="assistant-float"><img src="images/cat.jpg" style="width:32px;height:32px;border-radius:50%;object-fit:cover;" /></div>

  <!-- Chat dialog -->
  <div class="assistant-chat" id="assistant-chat">
    <div class="chat-header">
      <span>小助教</span>
      <button class="chat-close" id="chat-close">✕</button>
    </div>
    <div class="chat-messages" id="chat-messages">
      <div class="chat-message assistant">你好！我是你的小助教，有什麼可以幫你的嗎？😊</div>
    </div>
    <div class="chat-input-area">
      <input type="text" class="chat-input" id="chat-input" placeholder="輸入訊息..." />
      <button class="chat-send" id="chat-send">➤</button>
    </div>
  </div>

  <script>
    const avatar = document.getElementById('user-avatar');
    const menu = document.getElementById('user-menu');
    if (avatar && menu) {
      avatar.addEventListener('click', (e) => {
        e.stopPropagation();
        menu.classList.toggle('hidden');
      });
      document.addEventListener('click', () => menu.classList.add('hidden'));
      menu.addEventListener('click', (e) => e.stopPropagation());
    }

    // ── Settings modal ──
    const settingsOverlay = document.getElementById('settings-overlay');
    const settingsClose = document.getElementById('settings-close');
    const menuSettings = document.getElementById('menu-settings');
    const settingsNav = document.getElementById('settings-nav');
    const settingsContent = document.getElementById('settings-content');

    const ALL_THEMES = [
      { id:'default', name:'Default', swatch:'#3b82f6' },
      { id:'slate', name:'Slate', swatch:'#a1a1aa' },
      { id:'carbon', name:'Carbon', swatch:'#fafafa' },
      { id:'forest', name:'Forest', swatch:'#4ade80' },
      { id:'ocean', name:'Ocean', swatch:'#38bdf8' },
      { id:'pine', name:'Pine', swatch:'#d97706' },
      { id:'moss', name:'Moss', swatch:'#84cc16' },
      { id:'sunset', name:'Sunset', swatch:'#ff7b4a' },
      { id:'ember', name:'Ember', swatch:'#ef4444' },
      { id:'amber', name:'Amber', swatch:'#f59e0b' },
      { id:'rose', name:'Rose', swatch:'#f472b6' },
      { id:'violet', name:'Violet', swatch:'#a78bfa' },
      { id:'sapphire', name:'Sapphire', swatch:'#60a5fa' },
      { id:'teal', name:'Teal', swatch:'#2dd4bf' },
      { id:'frost', name:'Frost', swatch:'#7dd3fc' },
      { id:'midnight', name:'Midnight', swatch:'#c084fc' },
      { id:'cinnamor', name:'Cinnamor', swatch:'#fb923c' },
      { id:'abyss', name:'Abyss', swatch:'#22c55e' },
      { id:'royal', name:'Royal', swatch:'#fbbf24' },
      { id:'blood', name:'Blood', swatch:'#dc2626' },
      { id:'steel', name:'Steel', swatch:'#64748b' },
      { id:'cherry', name:'Cherry', swatch:'#fb7185' },
      { id:'ink', name:'Ink', swatch:'#f5d742' },
      { id:'shadow', name:'Shadow', swatch:'#cbd5e1' },
      { id:'lavender', name:'Lavender', swatch:'#c4b5fd' },
      { id:'cedar', name:'Cedar', swatch:'#b8860b' },
      { id:'storm', name:'Storm', swatch:'#facc15' },
      { id:'copper', name:'Copper', swatch:'#c2410c' },
      { id:'neon', name:'Neon', swatch:'#22d3ee' },
      { id:'dusk', name:'Dusk', swatch:'#818cf8' },
    ];

    const SETTINGS_SECTIONS = {
      general: {
        icon: '⚙️', label: '一般',
        subs: [
          { id: 'language', icon: '🌐', label: '語言' },
        ]
      },
      profile: {
        icon: '👤', label: '個人檔案',
        subs: [
          { id: 'avatar', icon: '🖼️', label: '頭像' },
          { id: 'name', icon: '✏️', label: '全名' },
        ]
      },
      personalization: {
        icon: '🎨', label: '個人化',
        subs: [
          { id: 'theme', icon: '🎨', label: '主題' },
        ]
      },
      domains: { icon: '📌', label: '應用領域設定' },
      data: { icon: '📊', label: '資料控制' },
      meeting: { icon: '🎙️', label: 'AI 會議記錄' },
      apikeys: { icon: '🔑', label: 'API 金鑰' },
      billing: { icon: '💳', label: '帳單' },
      account: {
        icon: '🏠', label: '帳戶',
        subs: [
          { id: 'assistant', icon: '🤖', label: '小助教設定' },
        ]
      },
    };

    function openSettings() {
      renderSettings();
      settingsOverlay.classList.add('open');
    }

    function closeSettings() {
      settingsOverlay.classList.remove('open');
    }

    function renderSettings() {
      // Render nav
      let navHtml = '';
      Object.entries(SETTINGS_SECTIONS).forEach(([id, sec]) => {
        navHtml += `<div class="settings-nav-group">`;
        navHtml += `<div class="settings-nav-item" data-section="${id}" data-depth="0">
          <span class="nav-icon">${sec.icon}</span> ${sec.label}
        </div>`;
        if (sec.subs) {
          navHtml += `<div class="settings-nav-sub">`;
          sec.subs.forEach(sub => {
            navHtml += `<div class="settings-nav-item" data-section="${id}" data-sub="${sub.id}" data-depth="1">
              <span class="nav-icon">${sub.icon}</span> ${sub.label}
            </div>`;
          });
          navHtml += `</div>`;
        }
        navHtml += `</div>`;
      });
      settingsNav.innerHTML = navHtml;

      // Render content sections
      let contentHtml = '';

      // — General / 一般 —
      contentHtml += `<div class="settings-content-section" data-section="general">
        <div class="settings-content-title">⚙️ 一般</div>
        <div class="settings-field">
          <div class="settings-field-label">🌐 顯示語言 / Display Language</div>
          <div class="settings-field-value">繁體中文</div>
        </div>
      </div>`;

      // — Language sub —
      contentHtml += `<div class="settings-content-section" data-section="general" data-sub="language">
        <div class="settings-content-title">🌐 語言 / Language</div>
        <div class="settings-field">
          <div class="settings-field-label">顯示語言 / Display Language</div>
          <div class="settings-field-value">繁體中文</div>
        </div>
      </div>`;

      // — Profile / 個人檔案 —
      contentHtml += `<div class="settings-content-section" data-section="profile">
        <div class="settings-content-title">👤 個人檔案 / Profile</div>
        <div class="settings-field">
          <div class="settings-field-label">🖼️ 頭像 / Avatar</div>
          <div class="settings-field-value"><img class="settings-field-avatar" src="images/cat.jpg" /> 北極熊</div>
        </div>
        <div class="settings-field-divider"></div>
        <div class="settings-field">
          <div class="settings-field-label">✏️ 全名 / Full Name</div>
          <div class="settings-field-value">Jason Hong</div>
        </div>
      </div>`;

      // — Avatar sub —
      contentHtml += `<div class="settings-content-section" data-section="profile" data-sub="avatar">
        <div class="settings-content-title">🖼️ 頭像 / Avatar</div>
        <div class="settings-field">
          <div class="settings-field-value"><img class="settings-field-avatar" src="images/cat.jpg" /> 北極熊</div>
        </div>
      </div>`;

      // — Name sub —
      contentHtml += `<div class="settings-content-section" data-section="profile" data-sub="name">
        <div class="settings-content-title">✏️ 全名 / Full Name</div>
        <div class="settings-field">
          <div class="settings-field-label">目前設定 / Current</div>
          <div class="settings-field-value">Jason Hong</div>
        </div>
      </div>`;

      // — Personalization / 個人化 —
      contentHtml += `<div class="settings-content-section" data-section="personalization">
        <div class="settings-content-title">🎨 個人化 / Personalization</div>
        <div class="settings-field">
          <div class="settings-field-label">🎨 主題 / Theme</div>
          <div class="settings-theme-grid" id="settings-theme-grid"></div>
        </div>
      </div>`;

      // — Theme sub —
      contentHtml += `<div class="settings-content-section" data-section="personalization" data-sub="theme">
        <div class="settings-content-title">🎨 主題 / Theme</div>
        <div class="settings-theme-grid" id="settings-theme-grid-sub"></div>
      </div>`;

      // — Application Domains / 應用領域設定 —
      contentHtml += `<div class="settings-content-section" data-section="domains">
        <div class="settings-content-title">📌 應用領域設定 / Application Domains</div>
        <div class="settings-field">
          <div class="settings-field-label">勾選啟用的領域，ICON 會顯示在主導覽列 / Enable domains to show in sidebar</div>
          <div class="settings-domain-grid" id="settings-domain-grid"></div>
        </div>
      </div>`;

      // — Connectors —
      contentHtml += `<div class="settings-content-section" data-section="connectors">
        <div class="settings-content-title">🔌 連接器 / Connectors</div>
        <div class="settings-field"><div class="settings-field-value" style="color:var(--text-muted);">暫無連接器 / No connectors</div></div>
      </div>`;

      // — Data —
      contentHtml += `<div class="settings-content-section" data-section="data">
        <div class="settings-content-title">📊 資料控制 / Data Control</div>
        <div class="settings-field"><div class="settings-field-value" style="color:var(--text-muted);">暫無資料 / No data</div></div>
      </div>`;

      // — Meeting —
      contentHtml += `<div class="settings-content-section" data-section="meeting">
        <div class="settings-content-title">🎙️ AI 會議記錄 / AI Meeting Notes</div>
        <div class="settings-field"><div class="settings-field-value" style="color:var(--text-muted);">尚未設定 / Not configured</div></div>
      </div>`;

      // — API Keys —
      contentHtml += `<div class="settings-content-section" data-section="apikeys">
        <div class="settings-content-title">🔑 API 金鑰 / API Keys</div>
        <div class="settings-field"><div class="settings-field-value" style="color:var(--text-muted);">尚未新增 / No keys added</div></div>
      </div>`;

      // — Billing —
      contentHtml += `<div class="settings-content-section" data-section="billing">
        <div class="settings-content-title">💳 帳單 / Billing</div>
        <div class="settings-field"><div class="settings-field-value" style="color:var(--text-muted);">無帳單記錄 / No billing history</div></div>
      </div>`;

      // — Account / 帳戶 —
      contentHtml += `<div class="settings-content-section" data-section="account">
        <div class="settings-content-title">🏠 帳戶 / Account</div>
        <div class="settings-field">
          <div class="settings-field-label">🤖 小助教設定 / Assistant</div>
          <div class="settings-assistant-options" id="settings-assistant-options"></div>
        </div>
      </div>`;

      // — Assistant sub —
      contentHtml += `<div class="settings-content-section" data-section="account" data-sub="assistant">
        <div class="settings-content-title">🤖 小助教設定 / Assistant</div>
        <div class="settings-assistant-options" id="settings-assistant-options-sub"></div>
      </div>`;

      settingsContent.innerHTML = contentHtml;

      // Nav click handlers
      settingsNav.querySelectorAll('.settings-nav-item').forEach(el => {
        el.addEventListener('click', (e) => {
          e.stopPropagation();
          const section = el.dataset.section;
          const sub = el.dataset.sub || null;
          navToSettings(section, sub);
        });
      });

      // Default: show general
      navToSettings('general', null);

      // Init theme grids
      initThemeGrid(document.getElementById('settings-theme-grid'));
      initThemeGrid(document.getElementById('settings-theme-grid-sub'));
      initAssistantOptions(document.getElementById('settings-assistant-options'));
      initAssistantOptions(document.getElementById('settings-assistant-options-sub'));
      initDomains();
    }

    function navToSettings(section, sub) {
      // Update nav active
      settingsNav.querySelectorAll('.settings-nav-item').forEach(el => {
        el.classList.remove('active');
        if (el.dataset.section === section && (el.dataset.sub || null) === (sub || null)) {
          el.classList.add('active');
        }
        // Also highlight parent when sub is active
        if (sub && el.dataset.section === section && !el.dataset.sub && el.dataset.depth === '0') {
          el.classList.add('active');
        }
      });

      // Show correct content
      settingsContent.querySelectorAll('.settings-content-section').forEach(el => {
        el.classList.remove('active');
        if (el.dataset.section === section && (el.dataset.sub || null) === (sub || null)) {
          el.classList.add('active');
        }
        // If no sub specified, show the section overview (the one without data-sub)
        if (!sub && el.dataset.section === section && !el.dataset.sub) {
          el.classList.add('active');
        }
      });
    }

    function initThemeGrid(container) {
      if (!container) return;
      const current = document.documentElement.getAttribute('data-theme') || 'default';
      container.innerHTML = ALL_THEMES.map(t =>
        `<div class="settings-theme-item${t.id === current ? ' active-theme' : ''}" data-theme="${t.id}">
          <div class="settings-theme-swatch" style="background:${t.swatch}"></div>
          <div class="settings-theme-name">${t.name}</div>
        </div>`
      ).join('');
      container.querySelectorAll('.settings-theme-item').forEach(el => {
        el.addEventListener('click', (e) => {
          e.stopPropagation();
          const theme = el.dataset.theme;
          document.documentElement.setAttribute('data-theme', theme);
          // Sync both grids
          document.querySelectorAll('.settings-theme-item').forEach(t => t.classList.remove('active-theme'));
          document.querySelectorAll(`.settings-theme-item[data-theme="${theme}"]`).forEach(t => t.classList.add('active-theme'));
        });
      });
    }

    function initAssistantOptions(container) {
      if (!container) return;
      const modes = [
        { mode:'off', icon:'💤', label:'關閉' },
        { mode:'robot', icon:'🤖', label:'機器人' },
        { mode:'cat', icon:'😺', label:'貓派' },
        { mode:'dog', icon:'🐶', label:'狗派' },
      ];
      container.innerHTML = modes.map(m =>
        `<div class="settings-assistant-item${m.mode === currentMode ? ' active' : ''}" data-mode="${m.mode}">
          <div class="settings-assistant-icon">${m.icon}</div>
          <div>${m.label}</div>
        </div>`
      ).join('');
      container.querySelectorAll('.settings-assistant-item').forEach(el => {
        el.addEventListener('click', (e) => {
          e.stopPropagation();
          setAssistantMode(el.dataset.mode);
          document.querySelectorAll('.settings-assistant-item').forEach(i => i.classList.remove('active'));
          document.querySelectorAll(`.settings-assistant-item[data-mode="${el.dataset.mode}"]`).forEach(i => i.classList.add('active'));
        });
      });
    }

    // ── Application Domains ──
    const DOMAINS = [
      { id: 'pm',     icon: '📋', label: 'PM 領域' },
      { id: 'manufacturing', icon: '🏭', label: '製造業' },
      { id: 'smart-mfg',    icon: '⚙️',  label: '智慧製造' },
      { id: 'education',    icon: '📚', label: '教育領域' },
    ];

    function getEnabledDomains() {
      try { return JSON.parse(localStorage.getItem('gs-enabled-domains') || '[]'); } catch { return []; }
    }

    function saveEnabledDomains(ids) {
      localStorage.setItem('gs-enabled-domains', JSON.stringify(ids));
    }

    function renderDomainNav() {
      const ids = getEnabledDomains();
      // Remove existing domain nav items
      document.querySelectorAll('.domain-nav-item').forEach(el => el.remove());
      // Find the "more" item anchor
      const moreItem = document.querySelector('.nav-item:last-child');
      if (!moreItem) return;
      ids.forEach(id => {
        const d = DOMAINS.find(x => x.id === id);
        if (!d) return;
        const el = document.createElement('div');
        el.className = 'nav-item domain-nav-item';
        el.innerHTML = `<span class="nav-icon">${d.icon}</span><span class="nav-label">${d.label}</span>`;
        moreItem.parentNode.insertBefore(el, moreItem);
      });
    }

    function initDomains() {
      const container = document.getElementById('settings-domain-grid');
      if (!container) return;
      const enabled = getEnabledDomains();
      container.innerHTML = DOMAINS.map(d => {
        const active = enabled.includes(d.id);
        return `<div class="settings-domain-item${active ? ' active' : ''}" data-domain="${d.id}">
          <div class="settings-domain-checkbox">${active ? '✓' : ''}</div>
          <span class="settings-domain-icon">${d.icon}</span>
          <span class="settings-domain-name">${d.label}</span>
        </div>`;
      }).join('');
      container.querySelectorAll('.settings-domain-item').forEach(el => {
        el.addEventListener('click', (e) => {
          e.stopPropagation();
          const id = el.dataset.domain;
          const enabled = getEnabledDomains();
          const idx = enabled.indexOf(id);
          if (idx > -1) {
            enabled.splice(idx, 1);
          } else {
            enabled.push(id);
          }
          saveEnabledDomains(enabled);
          // Refresh domain items UI
          container.querySelectorAll('.settings-domain-item').forEach(item => {
            const isOn = enabled.includes(item.dataset.domain);
            item.classList.toggle('active', isOn);
            item.querySelector('.settings-domain-checkbox').textContent = isOn ? '✓' : '';
          });
          renderDomainNav();
        });
      });
    }

    // Init domain nav on page load
    document.addEventListener('DOMContentLoaded', renderDomainNav);

    menuSettings.addEventListener('click', (e) => {
      e.stopPropagation();
      menu.classList.add('hidden');
      openSettings();
    });

    settingsClose.addEventListener('click', closeSettings);
    settingsOverlay.addEventListener('click', (e) => {
      if (e.target === settingsOverlay) closeSettings();
    });

    // ── Assistant mode ──
    const assistantFloat = document.getElementById('assistant-float');
    const assistantChat = document.getElementById('assistant-chat');
    const chatClose = document.getElementById('chat-close');
    const chatInput = document.getElementById('chat-input');
    const chatSend = document.getElementById('chat-send');
    const chatMessages = document.getElementById('chat-messages');

    const icons = { off: '', robot: '🤖', cat: '<img src="images/cat.jpg" style="width:32px;height:32px;border-radius:50%;object-fit:cover;" />', dog: '<img src="images/dog.webp" style="width:32px;height:32px;border-radius:50%;object-fit:cover;" />' };
    const labels = { off: '關閉', robot: '機器人', cat: '貓派', dog: '狗派' };
    let currentMode = 'cat';

    function setAssistantMode(mode) {
      currentMode = mode;
      if (mode === 'off') {
        assistantFloat.classList.add('hidden');
        assistantChat.classList.remove('open');
      } else {
        assistantFloat.classList.remove('hidden');
        assistantFloat.innerHTML = icons[mode];
      }
    }

    setAssistantMode('cat');

    assistantFloat.addEventListener('click', (e) => {
      e.stopPropagation();
      assistantChat.classList.toggle('open');
    });

    chatClose.addEventListener('click', (e) => {
      e.stopPropagation();
      assistantChat.classList.remove('open');
    });

    function sendMessage() {
      const text = chatInput.value.trim();
      if (!text) return;
      chatMessages.innerHTML += `<div class="chat-message user">${text}</div>`;
      chatInput.value = '';
      setTimeout(() => {
        chatMessages.innerHTML += `<div class="chat-message assistant">收到！我是${labels[currentMode]}模式的小助教。😊</div>`;
        chatMessages.scrollTop = chatMessages.scrollHeight;
      }, 500);
      chatMessages.scrollTop = chatMessages.scrollHeight;
    }

    chatSend.addEventListener('click', sendMessage);
    chatInput.addEventListener('keydown', (e) => {
      if (e.key === 'Enter') sendMessage();
    });
  </script>

</body>
</html>
